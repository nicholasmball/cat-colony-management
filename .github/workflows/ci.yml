name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Node 24 (LTS) ships npm 11 — matches the npm that generated
          # package-lock.json and the Node version Vercel builds on. Node 22
          # (npm 10) resolved @swc/helpers differently and rejected the lock.
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      # Fail fast & cheap before the expensive build.
      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          # Placeholder public env so `next build` succeeds without secrets.
          # Real values come from Vercel at deploy time.
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
