# Supabase local config. Run `supabase init` once if your CLI version expects
# extra sections, then `supabase start` and `supabase db reset` to apply
# migrations from ./migrations. Real cloud project settings live in the
# Supabase dashboard, not here.
project_id = "cat-colony-management"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000"]
jwt_expiry = 3600
enable_signup = false # invite-only: no open self-registration

[storage]
enabled = true
